<!doctype html><html lang="pl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ELKASS Showroom Ready</title><link href="/assets/css/v2-stage1.css" rel="stylesheet"><link href="/assets/css/m4-showroom-ready.css" rel="stylesheet">  <link rel="stylesheet" href="/assets/css/elkass-seasonal-engine.css">
</head><body class="showroom-page"><main><section class="m4-showroom-banner"><div class="m4-inner"><div><span class="m4-kicker">Showroom Ready</span><h2>ELKASS wygląda jak sklep, nie jak szkielet</h2><p>Ta strona pokazuje demo content: produkty, grafiki, inspiracje, kategorie i miejsce pod prawdziwe materiały ELKASS.</p><div class="m4-actions"><a class="m4-btn" href="/">Strona główna</a><a class="m4-btn ghost" href="/admin/">Panel</a></div></div><div class="m4-visual"><img src="/assets/gallery/gallery-16-salon-elkass.jpg"><img src="/assets/products/product-05-telewizor-samsung.jpg"><img src="/assets/gallery/gallery-02-piekarniki-agd.jpg"></div></div></section><section class="m4-section"><div class="wrap"><div class="m4-head"><div><h2>Produkty demonstracyjne</h2><p>Wszystkie karty mają obrazy i linki do produktu.</p></div></div><div id="m4Products" class="m4-grid"></div></div></section></main><script src="/assets/js/m4-showroom-ready.js"></script><script>document.addEventListener('DOMContentLoaded',()=>{const raw=localStorage.getItem('elkass_demo_products');const el=document.getElementById('m4Products');if(raw&&el){JSON.parse(raw).forEach(p=>el.insertAdjacentHTML('beforeend',`<article class="m4-card"><div class="m4-card-img"><img src="${p.image}"></div><div class="m4-card-body"><span class="m4-badge">${p.badge}</span><h3>${p.name}</h3><p>${p.short}</p><div class="m4-price"><strong>${p.price}</strong><s>${p.old}</s></div><a href="/app/product/?id=${p.id}">Zobacz produkt →</a></div></article>`));}});</script>  <script src="/assets/js/elkass-seasonal-engine.js"></script>
</body></html>
