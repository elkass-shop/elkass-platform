<!doctype html><html lang="pl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Wyszukiwarka — ELKASS</title><link rel="stylesheet" href="/assets/css/v2-stage1.css"><link rel="stylesheet" href="/assets/css/v48-v49-polish.css"></head><body><header class="site-header"><div class="wrap header-main"><a class="logo logo-premium" href="/"><div class="logo-type"><strong><span>ELKASS</span><em>OLESNO</em></strong><small>RTV • AGD • MULTIMEDIA • SERWIS</small></div></a></div></header><main class="section"><div class="wrap"><div class="v49-search-preview"><h1>Wyszukiwarka ELKASS</h1><p>Podgląd modułu V49. Docelowo będzie wyszukiwać produkty, kategorie, producentów i promocje.</p><div class="v49-search-bar"><input id="q" placeholder="Wpisz np. zmywarka 60 cm"><button class="btn" onclick="runSearch()">Szukaj</button></div><div id="results"><div class="v49-result"><b>Bosch zmywarka 60 cm Serie 4</b><small>Produkt • dostępny od ręki • raty 0%</small></div></div></div></div></main><script>async function runSearch(){const q=(document.getElementById('q').value||'').toLowerCase();const box=document.getElementById('results');try{const data=await fetch('/data/products.json').then(r=>r.json());const items=(Array.isArray(data)?data:data.products||[]).filter(p=>JSON.stringify(p).toLowerCase().includes(q)).slice(0,8);box.innerHTML=items.length?items.map(p=>`<div class="v49-result"><b>${p.name||p.title}</b><small>${p.brand||''} • ${p.price||''} zł</small></div>`).join(''):'<div class="v49-result"><b>Brak wyników</b><small>Spróbuj innej frazy.</small></div>'}catch(e){box.innerHTML='<div class="v49-result"><b>Moduł demo</b><small>Nie udało się odczytać produktów.</small></div>'}}</script></body></html>
